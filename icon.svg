<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0c1a2e"/>
      <stop offset="100%" stop-color="#0f1a10"/>
    </linearGradient>
    <radialGradient id="sunG" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fef9c3"/>
      <stop offset="60%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#d97706"/>
    </radialGradient>
    <linearGradient id="cabG" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#15803d"/>
    </linearGradient>
    <linearGradient id="hoodG" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#16a34a"/>
      <stop offset="100%" stop-color="#14532d"/>
    </linearGradient>
    <linearGradient id="tireG" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#292524"/>
      <stop offset="100%" stop-color="#1c1917"/>
    </linearGradient>
    <linearGradient id="fieldG" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#166534"/>
      <stop offset="100%" stop-color="#14532d"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>

  <!-- Field / ground -->
  <rect x="0" y="444" width="512" height="68" fill="url(#fieldG)"/>
  <!-- Field rows -->
  <g stroke="#0f4022" stroke-width="3" opacity="0.7">
    <line x1="0" y1="456" x2="512" y2="456"/>
    <line x1="0" y1="468" x2="512" y2="468"/>
    <line x1="0" y1="480" x2="512" y2="480"/>
  </g>

  <!-- Sun glow -->
  <circle cx="408" cy="106" r="75" fill="#fbbf24" opacity="0.12"/>
  <!-- Sun rays -->
  <g transform="translate(408,106)" fill="#fbbf24" opacity="0.85">
    <rect x="-11" y="-96" width="22" height="44" rx="11"/>
    <rect x="-11" y="-96" width="22" height="44" rx="11" transform="rotate(45)"/>
    <rect x="-11" y="-96" width="22" height="44" rx="11" transform="rotate(90)"/>
    <rect x="-11" y="-96" width="22" height="44" rx="11" transform="rotate(-45)"/>
    <rect x="-11" y="-96" width="22" height="44" rx="11" transform="rotate(135)"/>
    <rect x="-11" y="-96" width="22" height="44" rx="11" transform="rotate(-90)"/>
    <rect x="-11" y="-96" width="22" height="44" rx="11" transform="rotate(-135)"/>
    <rect x="-11" y="-96" width="22" height="44" rx="11" transform="rotate(180)"/>
  </g>
  <!-- Sun -->
  <circle cx="408" cy="106" r="58" fill="url(#sunG)"/>

  <!-- ─── TRAKTOR ─────────────────────────────── -->

  <!-- Rear tyre -->
  <circle cx="335" cy="368" r="112" fill="url(#tireG)"/>
  <!-- Rear rim -->
  <circle cx="335" cy="368" r="84" fill="#3d3733"/>
  <!-- Rear spokes -->
  <g stroke="#57534e" stroke-width="9" stroke-linecap="round">
    <line x1="335" y1="368" x2="335" y2="292"/>
    <line x1="335" y1="368" x2="335" y2="444"/>
    <line x1="335" y1="368" x2="259" y2="314"/>
    <line x1="335" y1="368" x2="411" y2="422"/>
    <line x1="335" y1="368" x2="411" y2="314"/>
    <line x1="335" y1="368" x2="259" y2="422"/>
    <line x1="335" y1="368" x2="259" y2="368"/>
    <line x1="335" y1="368" x2="411" y2="368"/>
  </g>
  <!-- Rear hub -->
  <circle cx="335" cy="368" r="24" fill="#a8a29e"/>
  <circle cx="335" cy="368" r="11" fill="#78716c"/>

  <!-- Front tyre -->
  <circle cx="145" cy="392" r="72" fill="url(#tireG)"/>
  <!-- Front rim -->
  <circle cx="145" cy="392" r="52" fill="#3d3733"/>
  <!-- Front spokes -->
  <g stroke="#57534e" stroke-width="7" stroke-linecap="round">
    <line x1="145" y1="392" x2="145" y2="344"/>
    <line x1="145" y1="392" x2="145" y2="440"/>
    <line x1="145" y1="392" x2="97"  y2="366"/>
    <line x1="145" y1="392" x2="193" y2="418"/>
    <line x1="145" y1="392" x2="193" y2="366"/>
    <line x1="145" y1="392" x2="97"  y2="418"/>
  </g>
  <!-- Front hub -->
  <circle cx="145" cy="392" r="15" fill="#a8a29e"/>
  <circle cx="145" cy="392" r="7"  fill="#78716c"/>

  <!-- Chassis -->
  <rect x="108" y="316" width="244" height="48" rx="7" fill="#14532d"/>

  <!-- Engine hood -->
  <rect x="88" y="250" width="172" height="72" rx="8" fill="url(#hoodG)"/>
  <!-- Hood highlight strip -->
  <rect x="88" y="250" width="172" height="16" rx="6" fill="#16a34a"/>
  <!-- Grille -->
  <rect x="88" y="280" width="26" height="42" rx="5" fill="#0d2b17"/>
  <g stroke="#166534" stroke-width="3.5" stroke-linecap="round">
    <line x1="89" y1="290" x2="113" y2="290"/>
    <line x1="89" y1="300" x2="113" y2="300"/>
    <line x1="89" y1="310" x2="113" y2="310"/>
    <line x1="89" y1="320" x2="113" y2="320"/>
  </g>

  <!-- Exhaust pipe -->
  <rect x="102" y="190" width="20" height="64" rx="10" fill="#1a3318"/>
  <ellipse cx="112" cy="190" rx="10" ry="6" fill="#0d1f0c"/>
  <!-- Smoke -->
  <circle cx="112" cy="172" r="9"  fill="#4b5563" opacity="0.35"/>
  <circle cx="122" cy="156" r="7"  fill="#6b7280" opacity="0.25"/>
  <circle cx="112" cy="143" r="5"  fill="#9ca3af" opacity="0.15"/>

  <!-- Cab body -->
  <rect x="254" y="196" width="140" height="128" rx="8" fill="url(#cabG)"/>
  <!-- Cab roof -->
  <rect x="250" y="190" width="148" height="22" rx="7" fill="#15803d"/>

  <!-- Window -->
  <rect x="266" y="214" width="114" height="76" rx="6" fill="#0ea5e9" opacity="0.75"/>
  <!-- Glass shimmer -->
  <rect x="269" y="217" width="42" height="22" rx="3" fill="white" opacity="0.18"/>

  <!-- Cab door line -->
  <line x1="338" y1="214" x2="338" y2="324" stroke="#15803d" stroke-width="3" opacity="0.8"/>

  <!-- Steps -->
  <rect x="390" y="306" width="20" height="9" rx="4" fill="#166534"/>
  <rect x="390" y="322" width="20" height="9" rx="4" fill="#166534"/>

  <!-- Headlight -->
  <circle cx="92" cy="263" r="11" fill="#fef08a" opacity="0.9"/>
  <circle cx="92" cy="263" r="7"  fill="#fefce8"/>

</svg>
